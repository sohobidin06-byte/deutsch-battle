<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Battle AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Deutsch Battle ⚔️</h1>

    <div id="login-screen">
        <input id="name-input" placeholder="Атыңызды жазыңыз...">
        <button onclick="joinGame()" class="btn-main">Оюнга кирүү</button>

        <div class="admin-section">
            <h3>Админ: Сөздөрдү массалык жүктөө</h3>
            <p>Формат: Немисче - Кыргызча - Орусча (ар бир сапта бирден)</p>
            <textarea id="bulk-text" rows="5" placeholder="Haus - Үй - Дом&#10;Baum - Бак - Дерево&#10;Buch - Китеп - Книга"></textarea>
            <button onclick="addBulkWords()" class="btn-admin">Базага баарын кошуу</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="stats">
            <span>⏳ <span id="game-timer">03:00</span></span>
            <span style="color: #fbbf24;">🤖 ИИ Активдүү</span>
        </div>

        <div id="rope-wrapper">
            <div id="rope">🟦——⚖️——🟥</div>
        </div>

        <div class="quiz-box">
            <h2 id="q-text">Даярсызбы?</h2>
            <div class="input-group">
                <input type="text" id="ans-input" placeholder="Немисчесин жаз..." autocomplete="off">
                <button onclick="submitAnswer()">ЖӨНӨТҮҮ</button>
            </div>
            <p>Суроо таймери: <span id="q-timer">20</span>с</p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
