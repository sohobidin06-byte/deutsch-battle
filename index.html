<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Battle | AI Mode</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Deutsch Battle ⚔️</h1>

    <div id="login-screen">
        <input id="name-input" placeholder="Атыңызды жазыңыз">
        <button onclick="joinGame()">Оюнга кирүү</button>
        <hr>
        <div class="admin-panel">
            <h4>Админ: Сөз кошуу</h4>
            <input id="new-de" placeholder="Немисче (Haus)">
            <input id="new-kg" placeholder="Кыргызча (Үй)">
            <input id="new-ru" placeholder="Орусча (Дом)">
            <button onclick="addWordToDB()" style="background:#10b981">Базага кошуу</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="header-info">
            <div class="timer">⏳ <span id="game-timer">03:00</span></div>
            <div id="ai-status">🤖 ИИ Бот каршылаш!</div>
        </div>

        <div id="rope-wrapper">
            <div id="rope">🟦——⚖️——🟥</div>
        </div>

        <div class="quiz-box">
            <h2 id="q-text">Жүктөлүүдө...</h2>
            <p>Таймер: <span id="q-timer">20</span>с</p>
            <input type="text" id="ans-input" placeholder="Жоопту жаз..." autocomplete="off">
            <button onclick="submitAnswer()">ЖӨНӨТҮҮ</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>
</body>
</html>
